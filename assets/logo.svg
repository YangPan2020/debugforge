<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="probeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="connectGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Light background -->
  <rect width="400" height="400" rx="40" fill="#f8fafc"/>
  <rect width="400" height="400" rx="40" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Center chip/MCU body -->
  <rect x="145" y="130" width="110" height="110" rx="12" fill="url(#chipGrad)" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Chip pins - top -->
  <rect x="165" y="118" width="8" height="16" rx="2" fill="#64748b"/>
  <rect x="183" y="118" width="8" height="16" rx="2" fill="#64748b"/>
  <rect x="201" y="118" width="8" height="16" rx="2" fill="#64748b"/>
  <rect x="219" y="118" width="8" height="16" rx="2" fill="#64748b"/>

  <!-- Chip pins - bottom -->
  <rect x="165" y="236" width="8" height="16" rx="2" fill="#64748b"/>
  <rect x="183" y="236" width="8" height="16" rx="2" fill="#64748b"/>
  <rect x="201" y="236" width="8" height="16" rx="2" fill="#64748b"/>
  <rect x="219" y="236" width="8" height="16" rx="2" fill="#64748b"/>

  <!-- Chip pins - left -->
  <rect x="133" y="150" width="16" height="8" rx="2" fill="#64748b"/>
  <rect x="133" y="168" width="16" height="8" rx="2" fill="#64748b"/>
  <rect x="133" y="186" width="16" height="8" rx="2" fill="#64748b"/>
  <rect x="133" y="204" width="16" height="8" rx="2" fill="#64748b"/>

  <!-- Chip pins - right -->
  <rect x="251" y="150" width="16" height="8" rx="2" fill="#64748b"/>
  <rect x="251" y="168" width="16" height="8" rx="2" fill="#64748b"/>
  <rect x="251" y="186" width="16" height="8" rx="2" fill="#64748b"/>
  <rect x="251" y="204" width="16" height="8" rx="2" fill="#64748b"/>

  <!-- Chip center die mark -->
  <circle cx="200" cy="185" r="22" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Breakpoint dot on chip (debug symbol) -->
  <circle cx="200" cy="185" r="8" fill="#ef4444"/>
  <circle cx="200" cy="185" r="4" fill="#fca5a5"/>

  <!-- Left side: TRACE32 Probe (hardware debugger) -->
  <!-- Probe body -->
  <rect x="30" y="162" width="70" height="46" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <!-- Probe label -->
  <text x="65" y="182" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#94a3b8" font-weight="600">TRACE32</text>
  <text x="65" y="196" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="7" fill="#64748b">DEBUGGER</text>
  <!-- Probe tip/connector -->
  <path d="M100 185 L133 185" stroke="url(#probeGrad)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="105" cy="185" r="3" fill="#f59e0b"/>

  <!-- Right side: AI Agent (brain/sparkle) -->
  <!-- AI circle -->
  <circle cx="330" cy="185" r="35" fill="url(#aiGrad)" fill-opacity="0.1" stroke="url(#aiGrad)" stroke-width="2"/>
  <!-- AI brain/network nodes -->
  <circle cx="320" cy="175" r="5" fill="#8b5cf6"/>
  <circle cx="340" cy="175" r="5" fill="#8b5cf6"/>
  <circle cx="330" cy="195" r="5" fill="#8b5cf6"/>
  <circle cx="315" cy="192" r="3.5" fill="#a78bfa"/>
  <circle cx="345" cy="192" r="3.5" fill="#a78bfa"/>
  <circle cx="330" cy="170" r="3.5" fill="#a78bfa"/>
  <!-- AI connections (neural links) -->
  <line x1="320" y1="175" x2="340" y2="175" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="320" y1="175" x2="330" y2="195" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="340" y1="175" x2="330" y2="195" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="315" y1="192" x2="320" y2="175" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="345" y1="192" x2="340" y2="175" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="330" y1="170" x2="320" y2="175" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="330" y1="170" x2="340" y2="175" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <!-- AI label -->
  <text x="330" y="230" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#7c3aed" font-weight="600">AI AGENT</text>

  <!-- Connection from chip to AI (MCP bridge) -->
  <path d="M267 185 L290 185" stroke="url(#connectGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 4"/>
  <!-- MCP label on the bridge -->
  <text x="278" y="175" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="7" fill="#6366f1" font-weight="500">MCP</text>

  <!-- Data flow arrows -->
  <!-- Left arrow (probe to chip) -->
  <polygon points="128,182 122,185 128,188" fill="#f59e0b"/>
  <!-- Right arrow (chip to AI) -->
  <polygon points="292,182 298,185 292,188" fill="#8b5cf6"/>

  <!-- Sparkle decorations (AI magic) -->
  <path d="M350 155 L352 150 L354 155 L359 157 L354 159 L352 164 L350 159 L345 157 Z" fill="#f59e0b" fill-opacity="0.8"/>
  <path d="M305 150 L306 147 L307 150 L310 151 L307 152 L306 155 L305 152 L302 151 Z" fill="#f59e0b" fill-opacity="0.6"/>
  <path d="M355 205 L356 202 L357 205 L360 206 L357 207 L356 210 L355 207 L352 206 Z" fill="#f59e0b" fill-opacity="0.5"/>

  <!-- Title -->
  <text x="200" y="300" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="36" font-weight="800" fill="#1e293b" letter-spacing="-0.5">DebugForge</text>

  <!-- Subtitle -->
  <text x="200" y="325" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="12" fill="#64748b" letter-spacing="0.5">Bridge TRACE32 to AI Agents via MCP</text>

  <!-- Bottom decoration line -->
  <line x1="130" y1="340" x2="270" y2="340" stroke="url(#connectGrad)" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>
</svg>
